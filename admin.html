<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Anfragen · Alpha Blueprint</title>
  <link rel="icon" type="image/webp" href="assets/logo%20alpha%20blueprint.webp">
  <meta name="theme-color" content="#1687cf">
  <link rel="manifest" href="manifest-admin.webmanifest">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Anfragen">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preload" href="assets/fonts/xn7gYHE41ni1AdIRggexSg.woff2" as="font" type="font/woff2" crossorigin><link rel="stylesheet" href="fonts.css">
  <style>
    :root{ --primary:#1687cf; --primary-dark:#0d5f99; --ink:#102638; --muted:#657888; --line:#dbe7ef; --pale:#f3f9fd; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:"Manrope",Arial,sans-serif; color:var(--ink); background:var(--pale);
      background-image:radial-gradient(1000px 500px at 100% -10%,rgba(22,135,207,.12),transparent 60%); min-height:100vh; }
    a{ color:var(--primary-dark); }
    .wrap{ max-width:1000px; margin:0 auto; padding:24px 18px 60px; }

    /* Login */
    .login{ min-height:100vh; display:grid; place-items:center; padding:20px; }
    .login-card{ width:100%; max-width:380px; background:#fff; border:1px solid var(--line); border-radius:22px;
      box-shadow:0 24px 60px rgba(26,75,108,.14); padding:34px 28px; }
    .login-card img{ width:64px; height:64px; object-fit:contain; display:block; margin:0 auto 14px; }
    .login-card h1{ font-size:1.3rem; text-align:center; margin:0 0 4px; }
    .login-card p.sub{ text-align:center; color:var(--muted); font-size:.9rem; margin:0 0 22px; }
    label{ display:block; font-size:.78rem; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:#466072; margin-bottom:14px; }
    input{ width:100%; margin-top:7px; padding:12px 14px; font:inherit; border:1px solid #cfe0ec; border-radius:12px; background:#f6fafd; outline:none; }
    input:focus{ border-color:var(--primary); box-shadow:0 0 0 4px rgba(22,135,207,.15); background:#fff; }
    .btn{ width:100%; border:0; cursor:pointer; color:#fff; font-weight:700; padding:13px; border-radius:999px;
      background:linear-gradient(135deg,#25a4ee,#0d5f99); box-shadow:0 12px 26px rgba(22,135,207,.3);
      transition:filter .15s, transform .1s; }
    .btn:hover{ filter:brightness(1.05); } .btn:active{ transform:scale(.98); }
    .btn[disabled]{ opacity:.6; cursor:default; }
    .showpw{ display:flex; align-items:center; gap:8px; text-transform:none; letter-spacing:normal; font-weight:600; color:#466072; margin:-6px 0 4px; }
    .showpw input{ width:auto; margin:0; }
    .msg{ font-size:.85rem; margin:14px 0 0; min-height:1em; }
    .msg.err{ color:#c0392b; } .msg.ok{ color:#1f9e57; }

    /* Dashboard */
    .topbar{ display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:20px; }
    .brand{ display:flex; align-items:center; gap:12px; }
    .brand img{ width:42px; height:42px; object-fit:contain; }
    .brand b{ font-size:1.05rem; } .brand span{ display:block; font-size:.78rem; color:var(--muted); }
    .ghost{ background:#fff; border:1px solid var(--line); color:var(--ink); border-radius:999px; padding:9px 16px; font:inherit; font-weight:700; cursor:pointer; }
    .ghost:hover{ background:#f1f7fc; }
    .stats{ display:flex; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
    .stat{ background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px 20px; box-shadow:0 8px 26px rgba(26,75,108,.06); }
    .stat b{ display:block; font-size:1.8rem; color:var(--primary-dark); line-height:1; }
    .stat span{ font-size:.8rem; color:var(--muted); }
    .list{ display:grid; gap:12px; }
    .entry{ background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px 20px; box-shadow:0 8px 26px rgba(26,75,108,.06); }
    .entry .head{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .entry .name{ font-weight:800; font-size:1.05rem; }
    .entry .date{ font-size:.78rem; color:var(--muted); white-space:nowrap; }
    .entry .mail{ font-size:.9rem; margin:2px 0 10px; }
    .entry .text{ color:#33485a; white-space:pre-line; }
    .entry .actions{ margin-top:12px; }
    .del{ border:1px solid #f0c7c7; background:#fff5f5; color:#c0392b; border-radius:999px; padding:7px 14px; font:inherit; font-weight:700; font-size:.85rem; cursor:pointer; transition:background .15s; }
    .del:hover{ background:#fdeaea; } .del[disabled]{ opacity:.5; cursor:default; }
    .empty{ text-align:center; color:var(--muted); padding:60px 20px; background:#fff; border:1px dashed var(--line); border-radius:18px; }
    .empty .big{ font-size:2.4rem; margin-bottom:8px; }
    .hidden{ display:none !important; }
    .center{ text-align:center; padding:50px; color:var(--muted); }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="login" class="login hidden">
    <form id="login-form" class="login-card">
      <img src="assets/logo%20alpha%20blueprint.webp" alt="Alpha Blueprint">
      <h1>Anfragen-Login</h1>
      <p class="sub">Nur für Alpha Blueprint</p>
      <label>E-Mail<input type="email" id="email" autocomplete="username" inputmode="email" autocapitalize="none" autocorrect="off" spellcheck="false" required></label>
      <label>Passwort<input type="password" id="password" autocomplete="current-password" autocapitalize="none" autocorrect="off" spellcheck="false" required></label>
      <label class="showpw"><input type="checkbox" id="showpw"> Passwort anzeigen</label>
      <button class="btn" type="submit" id="login-btn">Anmelden</button>
      <p class="msg" id="login-msg"></p>
    </form>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" class="wrap hidden">
    <div class="topbar">
      <div class="brand">
        <img src="assets/logo%20alpha%20blueprint.webp" alt="">
        <div><b>Formular-Anfragen</b><span id="who"></span></div>
      </div>
      <div>
        <button class="ghost" id="refresh">Aktualisieren</button>
        <button class="ghost" id="logout">Abmelden</button>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><b id="count">–</b><span>Anfragen gesamt</span></div>
      <div class="stat"><b id="count7">–</b><span>in den letzten 7 Tagen</span></div>
    </div>
    <div id="list" class="list"></div>
  </div>

  <div id="boot" class="center">Lädt…</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js?v=3"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
